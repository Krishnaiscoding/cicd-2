name: CI/CD Pipeline

on:
  push:
    branches:
      - main
jobs:
    build:
        runs-on: ubuntu-latest
        steps:
          - name: Checkout Code
            uses: actions/checkout@v4
          
          
          - name: Login to Docker Hub
            uses: docker/login-action@v3
            with:
              username: Krishnaiscoding
              password: ${{ secrets.DOCKER_PASSWORD }}
          - name: Build Image
            run: docker build -t Krishnaiscoding/practice:latest .
          - name: Push Image
            run: docker push Krishnaiscoding/practice:latest