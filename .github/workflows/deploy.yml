name: CI/CD Pipeline

on:
  push:
    branches:
      - main
jobs:
    build:
        runs-on: ubuntu-latest
        steps:
          - name: Checkout Code
            uses: actions/checkout@v4
          - name: Build Docker Image
            run: docker build -t website .
          - name: Run Docker Container
            run: docker run -d -p 8080:80 website
          - name: Verify Docker Images
            run: docker images
          - name: Verify Docker Process
            run: docker ps
          - name: Login to Docker Hub
            uses: docker/login-action@v3
            with:
              username: ${{ secrets.DOCKER_USERNAME }}
              password: ${{ secrets.DOCKER_PASSWORD }}
          - name: Build Image
            run: docker build -t ${{ secrets.DOCKER_USERNAME }}/website:latest .
          - name: Push Image
            run: docker push ${{ secrets.DOCKER_USERNAME }}/website:latest